<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"

    <title>Super Mario 64 on the Web!</title>
    <style>
      body,
      html {
        background-color: #000000;
        image-rendering: pixelated;
        margin: 0;
        padding: 0;
      }
      #container {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        cursor: pointer;
        display: block;
      }

      /* Mobile touch controls (hidden by default, shown on mobile) */
      #touch-controls {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: none;
      }
      .tc-side {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 26vw;
        max-width: 180px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 10px 6px;
        box-sizing: border-box;
        pointer-events: none;
      }
      .tc-left {
        left: 0;
        align-items: flex-start;
      }
      .tc-right {
        right: 0;
        align-items: flex-end;
      }
      .tc-row {
        display: flex;
        gap: 8px;
        pointer-events: none;
      }
      .tc-btn,
      .tc-stick-inner,
      .tc-dpad-btn {
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      .tc-btn {
        min-width: 42px;
        min-height: 42px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
      }
      .tc-btn:active {
        transform: scale(0.96);
        background: rgba(255, 255, 255, 0.14);
      }
      .tc-shoulders {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
        pointer-events: none;
      }
      .tc-shoulders-right {
        align-items: flex-end;
      }
      .tc-shoulder-btn {
        border-radius: 14px;
        padding: 4px 10px;
        min-width: 52px;
        min-height: 30px;
        font-size: 11px;
      }
      /* Left movement pad */
      .tc-stick-wrap {
        width: 120px;
        height: 120px;
        max-width: 40vw;
        max-height: 40vw;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), rgba(0,0,0,0.7));
        position: relative;
        margin-left: 8px;
        pointer-events: auto;
      }
      .tc-stick-inner {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 60px;
        height: 60px;
        max-width: 24vw;
        max-height: 24vw;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), rgba(0,0,0,0.8));
        transform: translate(-50%, -50%);
      }
      .tc-dpad {
        position: absolute;
        inset: 14px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        pointer-events: none;
      }
      .tc-dpad-btn {
        border-radius: 10px;
        border: none;
        background: transparent;
      }
      .tc-dpad-btn:active {
        background: rgba(255, 255, 255, 0.18);
      }
      .tc-dpad-up { grid-column: 2 / 3; grid-row: 1 / 2; }
      .tc-dpad-down { grid-column: 2 / 3; grid-row: 3 / 4; }
      .tc-dpad-left { grid-column: 1 / 2; grid-row: 2 / 3; }
      .tc-dpad-right { grid-column: 3 / 4; grid-row: 2 / 3; }

      /* Right buttons: A/B + C-buttons + Start */
      .tc-face {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-right: 10px;
        pointer-events: none;
      }
      .tc-ab {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-end;
        pointer-events: none;
      }
      .tc-ab .tc-btn {
        min-width: 48px;
        min-height: 48px;
        font-size: 14px;
      }
      .tc-a { background: radial-gradient(circle at 30% 30%, #00c853, #005c2f); }
      .tc-b { background: radial-gradient(circle at 30% 30%, #ff6b35, #7a1b00); }
      .tc-cpad {
        display: grid;
        grid-template-columns: repeat(3, 28px);
        grid-template-rows: repeat(3, 28px);
        gap: 4px;
        pointer-events: none;
        align-self: center;
      }
      .tc-cpad .tc-btn {
        min-width: 28px;
        min-height: 28px;
        font-size: 11px;
      }
      .tc-c-up { grid-column: 2 / 3; grid-row: 1 / 2; }
      .tc-c-down { grid-column: 2 / 3; grid-row: 3 / 4; }
      .tc-c-left { grid-column: 1 / 2; grid-row: 2 / 3; }
      .tc-c-right { grid-column: 3 / 4; grid-row: 2 / 3; }
      .tc-start-wrap {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
      }
      .tc-start {
        min-width: 48px;
        min-height: 32px;
        border-radius: 999px;
        font-size: 11px;
      }
    </style>

  <body>

    <script type="text/javascript">

          // Add fullscreen functionality on click (fullscreen the container so overlay stays visible)

              } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
              }
            }
          });

          return canvas;
        })(),
        setStatus: function (text) {},
      };

    <script>
      // Virtual controller: send keyboard events for touch buttons
      (function () {
        // Simple mobile detection
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                       (navigator.maxTouchPoints > 0 && /Macintosh/i.test(navigator.userAgent)); // includes iPad Pro

        if (isMobile) {
          document.getElementById('touch-controls').style.display = 'block';
        }

        function sendKey(type, key, code, keyCode) {
          var eventInit = {
            key: key,
            code: code,
            keyCode: keyCode,
            which: keyCode,
            bubbles: true,
            cancelable: true
          };
          var e = new KeyboardEvent(type, eventInit);
          // Some browsers treat keyCode/which as read-only, but Emscripten
          // typically reads whichever is present.
          Object.defineProperty(e, "keyCode", { get: function () { return keyCode; } });
          Object.defineProperty(e, "which", { get: function () { return keyCode; } });
          window.dispatchEvent(e);
        }

        function attachButton(el) {
          var key = el.getAttribute("data-key");
          var code = el.getAttribute("data-code");
          var keyCode = parseInt(el.getAttribute("data-keycode"), 10);
          if (!key || !code || !keyCode) return;

          var active = false;

          function down(ev) {
            ev.preventDefault();
            ev.stopPropagation();
            if (active) return;
            active = true;
            sendKey("keydown", key, code, keyCode);
          }

          function up(ev) {
            ev.preventDefault();
            ev.stopPropagation();
            if (!active) return;
            active = false;
            sendKey("keyup", key, code, keyCode);
          }

          el.addEventListener("touchstart", down, { passive: false });
          el.addEventListener("touchend", up, { passive: false });
          el.addEventListener("touchcancel", up, { passive: false });
          el.addEventListener("mousedown", down);
          window.addEventListener("mouseup", up);
        }

        if (isMobile) {
          var buttons = document.querySelectorAll(
            "#touch-controls [data-key][data-code][data-keycode]"
          );
          buttons.forEach(attachButton);

          // Analog stick: drag-based joystick that follows finger/mouse
          var stickWrap = document.querySelector(".tc-stick-wrap");
          var stickInner = document.querySelector(".tc-stick-inner");
          if (stickWrap && stickInner) {
            var stickActive = false;
            var stickTouchId = null;
            var maxOffset = 0;

            // Current digital directions derived from the stick
            var dirState = { up: false, down: false, left: false, right: false };

            function updateMaxOffset() {
              maxOffset = (stickWrap.clientWidth - stickInner.clientWidth) / 2;
              if (maxOffset < 0) maxOffset = 0;
            }
            updateMaxOffset();
            window.addEventListener("resize", updateMaxOffset);

            function centerStick() {
              stickInner.style.transition = "transform 120ms ease-out";
              stickInner.style.transform = "translate(calc(-50%), calc(-50%))";
              setTimeout(function () {
                stickInner.style.transition = "";
              }, 130);

              // Release any active movement keys
              updateDirections(0, 0, true);
            }

            // Map stick offset -> digital arrow keys
            function updateDirections(dx, dy, forceRelease) {
              if (!maxOffset) {
                return;
              }

              var nx = dx / maxOffset;
              var ny = dy / maxOffset;
              var mag = Math.sqrt(nx * nx + ny * ny);
              var threshold = 0.35;

              if (forceRelease || mag < threshold) {
                setDir(false, false, false, false);
                return;
              }

              var up = ny < -threshold;
              var down = ny > threshold;
              var left = nx < -threshold;
              var right = nx > threshold;

              setDir(up, down, left, right);
            }

            function setDir(up, down, left, right) {
              // Helper to send key changes
              function toggle(dirName, desired, key, code, keyCode) {
                var current = dirState[dirName];
                if (desired !== current) {
                  dirState[dirName] = desired;
                  if (desired) {
                    sendKey("keydown", key, code, keyCode);
                  } else {
                    sendKey("keyup", key, code, keyCode);
                  }
                }
              }

              toggle("up", up, "ArrowUp", "ArrowUp", 38);
              toggle("down", down, "ArrowDown", "ArrowDown", 40);
              toggle("left", left, "ArrowLeft", "ArrowLeft", 37);
              toggle("right", right, "ArrowRight", "ArrowRight", 39);
            }

            function handleStickMove(clientX, clientY) {
              var rect = stickWrap.getBoundingClientRect();
              var dx = clientX - (rect.left + rect.width / 2);
              var dy = clientY - (rect.top + rect.height / 2);

              var dist = Math.sqrt(dx * dx + dy * dy) || 1;
              if (dist > maxOffset && maxOffset > 0) {
                var scale = maxOffset / dist;
                dx *= scale;
                dy *= scale;
              }

              stickInner.style.transform =
                "translate(calc(-50% + " + dx + "px), calc(-50% + " + dy + "px))";

              updateDirections(dx, dy, false);
            }

            // Touch controls: drag anywhere on the stick area
            stickWrap.addEventListener(
              "touchstart",
              function (ev) {
                ev.preventDefault();
                if (stickActive) return;
                var t = ev.changedTouches[0];
                stickActive = true;
                stickTouchId = t.identifier;
                handleStickMove(t.clientX, t.clientY);
              },
              { passive: false }
            );

            stickWrap.addEventListener(
              "touchmove",
              function (ev) {
                if (!stickActive) return;
                var touches = ev.changedTouches;
                for (var i = 0; i < touches.length; i++) {
                  var t = touches[i];
                  if (t.identifier === stickTouchId) {
                    ev.preventDefault();
                    handleStickMove(t.clientX, t.clientY);
                    break;
                  }
                }
              },
              { passive: false }
            );

            stickWrap.addEventListener(
              "touchend",
              function (ev) {
                if (!stickActive) return;
                var touches = ev.changedTouches;
                for (var i = 0; i < touches.length; i++) {
                  var t = touches[i];
                  if (t.identifier === stickTouchId) {
                    ev.preventDefault();
                    stickActive = false;
                    stickTouchId = null;
                    centerStick();
                    break;
                  }
                }
              },
              { passive: false }
            );

            stickWrap.addEventListener(
              "touchcancel",
              function (ev) {
                if (!stickActive) return;
                stickActive = false;
                stickTouchId = null;
                centerStick();
              },
              { passive: false }
            );

            // Mouse controls for desktop testing
            var mouseActive = false;

            stickWrap.addEventListener("mousedown", function (ev) {
              ev.preventDefault();
              mouseActive = true;
              handleStickMove(ev.clientX, ev.clientY);
            });

            window.addEventListener("mousemove", function (ev) {
              if (!mouseActive) return;
              ev.preventDefault();
              handleStickMove(ev.clientX, ev.clientY);
            });

            window.addEventListener("mouseup", function () {
              if (!mouseActive) return;
              mouseActive = false;
              centerStick();
            });

            // Initial center
            centerStick();
          }
        }
      })();
    </script>
